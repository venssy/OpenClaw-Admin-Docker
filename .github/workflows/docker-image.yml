name: Node22 Build to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'itq5/OpenClaw-Admin'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: . # 指向拉取后的源码根目录
          file: ./Dockerfile # 使用你刚创建的 Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openclaw-admin:latest
